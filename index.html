<!DOCTYPE html>
<html>
<head>
  <title>Hack Playground 😈</title>
</head>
<body>

  <div id="content">
    <h1>👋 Hi</h1>
    <p>Do you wanna hack this website? 😈</p>

    <h3>Step 1:</h3>
    <p>Add <code>?msg=hello</code> to the URL</p>

    <h3>Step 2:</h3>
    <p>Try HTML like <code>?msg=&lt;h1&gt;HI&lt;/h1&gt;</code></p>

    <h3>Step 3:</h3>
    <p>Go crazy 😈</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if (msg) {
      document.getElementById("content").innerHTML = msg;
    }
  </script>

</body>
</html>
